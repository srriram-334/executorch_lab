name: executorch-builder

on: [push]

jobs:
  repo-download:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: check the files from checkout 
        run: |
          ls -la
 
      - name: installing micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          init-shell: bash

      - name: clone executorch viable/strict branch
        uses: GuillaumeFalourd/clone-github-repo-action@main
        with:
          depth: 1
          branch: 'viable/strict'
          owner: 'pytorch'
          repository: 'executorch'

      - name: access the repository
        run: |
          ls -la
          cd executorch
          echo "repo cloned successfully"
      
      - name: install executorch with CORTEX_M backend
        env:
          args: "-DEXECUTORCH_BUILD_COREML=OFF -DEXECUTORCH_BUILD_CORTEX_M=ON -DEXECUTORCH_BUILD_XNNPACK=OFF"
        run: | 
          cd executorch
          echo "successful"

